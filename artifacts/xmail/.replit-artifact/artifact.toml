kind = "web"
previewPath = "/"
title = "Goldmailer"
version = "1.0.0"
id = "artifacts/xmail"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18649

[services.development]
run = "pnpm --filter @workspace/xmail run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xmail", "run", "build" ]
publicDir = "artifacts/xmail/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18649"
BASE_PATH = "/"
